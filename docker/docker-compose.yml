services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aios}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aios}
      POSTGRES_DB: ${POSTGRES_DB:-aios}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aios}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      GENERIC_TIMEZONE: ${TZ:-UTC}
    volumes:
      - n8n_data:/home/node/.n8n

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-aios}:${POSTGRES_PASSWORD:-aios}@postgres:5432/${POSTGRES_DB:-aios}
      AI_SERVICES_URL: http://ai-services:8001
    depends_on:
      postgres:
        condition: service_healthy
      ai-services:
        condition: service_started

  ai-services:
    build:
      context: ../ai-services
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      QDRANT_URL: http://qdrant:6333
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-aios}:${POSTGRES_PASSWORD:-aios}@postgres:5432/${POSTGRES_DB:-aios}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
  n8n_data:
